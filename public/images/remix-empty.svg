<svg xmlns="http://www.w3.org/2000/svg" width="640" height="420" viewBox="0 0 640 420" role="img" aria-label="Album covers and music artwork illustration">
  <defs>
    <linearGradient id="coverPink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="coverBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="coverOrange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="vinyl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="640" height="420" rx="22" fill="#ffffff"/>
  <circle cx="110" cy="88" r="6" fill="#e2e8f0"/>
  <circle cx="148" cy="88" r="6" fill="#e2e8f0"/>
  <circle cx="186" cy="88" r="6" fill="#e2e8f0"/>

  <g filter="url(#softShadow)">
    <rect x="130" y="120" width="190" height="190" rx="18" fill="url(#coverBlue)"/>
    <rect x="168" y="152" width="70" height="70" rx="10" fill="#ffffff" opacity="0.9"/>
    <rect x="246" y="230" width="60" height="12" rx="6" fill="#ffffff" opacity="0.7"/>
    <rect x="246" y="250" width="70" height="12" rx="6" fill="#ffffff" opacity="0.5"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="250" y="90" width="210" height="210" rx="20" fill="url(#coverPink)"/>
    <circle cx="356" cy="195" r="44" fill="#ffffff" opacity="0.9"/>
    <circle cx="356" cy="195" r="10" fill="#a855f7" opacity="0.8"/>
    <path d="M328 235c26 14 64 10 86-6" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.65"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="370" y="140" width="170" height="170" rx="18" fill="url(#coverOrange)"/>
    <path d="M420 182h70" stroke="#ffffff" stroke-width="14" stroke-linecap="round" opacity="0.85"/>
    <path d="M420 212h50" stroke="#ffffff" stroke-width="12" stroke-linecap="round" opacity="0.65"/>
    <path d="M420 242h80" stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
  </g>

  <g>
    <circle cx="520" cy="110" r="38" fill="url(#vinyl)"/>
    <circle cx="520" cy="110" r="20" fill="#0f172a"/>
    <circle cx="520" cy="110" r="6" fill="#f97316"/>
  </g>

  <g fill="none" stroke="#94a3b8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M470 74v38c0 10-8 18-18 18s-18-8-18-18 8-18 18-18c6 0 12 3 16 7"/>
    <path d="M500 62v50c0 10-8 18-18 18s-18-8-18-18 8-18 18-18c6 0 12 3 16 7"/>
  </g>

  <g opacity="0.5">
    <path d="M120 330c38-14 78-14 116 0" stroke="#cbd5f5" stroke-width="8" stroke-linecap="round"/>
    <path d="M404 330c42-18 86-18 128 0" stroke="#fbcfe8" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>